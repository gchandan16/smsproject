name: SMS Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        run: |
          echo "VITE_API_URL=/api" > .env.production
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete
          echo "Frontend deployed to S3!"

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            echo "=== Starting deployment ==="

            # Clone or pull latest code
            if [ -d "/home/ubuntu/app/.git" ]; then
              cd /home/ubuntu/app
              git pull origin main
            else
              cd /home/ubuntu
              rm -rf app
              mkdir -p app
              git clone https://github.com/gchandan16/smsproject.git app
            fi

            # Install Python dependencies
            cd /home/ubuntu/app/backend
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Restart FastAPI service
            sudo systemctl daemon-reload
            sudo systemctl restart sms
            sleep 3

            # Check status
            if sudo systemctl is-active --quiet sms; then
              echo "=== FastAPI is running! Deployment successful! ==="
            else
              echo "=== ERROR: FastAPI failed to start ==="
              sudo journalctl -u sms --no-pager -n 20
              exit 1
            fi
          ENDSSH
